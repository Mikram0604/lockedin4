kind = "web"
previewPath = "/"
title = "Disha — Counselor Dashboard"
version = "1.0.0"
id = "artifacts/disha-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25545

[services.development]
run = "pnpm --filter @workspace/disha-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/disha-dashboard", "run", "build" ]
publicDir = "artifacts/disha-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25545"
BASE_PATH = "/"
